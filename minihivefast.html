<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Hive Ultimate Ultra Kilat</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@hiveio/hive-js/dist/hive.min.js"></script>
<style>
html, body{height:100%;margin:0;padding:12px;font-family:system-ui;background:#f2f4f8;overflow-x:hidden;}
.container{max-width:640px;margin:auto;}
h1{color:#1f2937;margin-bottom:12px;}
ul{list-style:none;padding:0;}
li{background:#fff;padding:12px;margin-bottom:8px;border-radius:8px;cursor:pointer;transition:.2s;}
li:hover{background:#2563eb;color:#fff;}
.post-card{background:#fff;padding:16px;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,.08);margin-bottom:16px;line-height:1.6;word-wrap:break-word;overflow-wrap:break-word;}
.post-card img{max-width:100%;height:auto;border-radius:8px;margin:10px 0;}
.comment{background:#f9fafb;border-radius:10px;padding:10px;margin-bottom:8px;border:1px solid #e5e7eb;}
.comment-author{font-weight:600;color:#2563eb;}
button{padding:8px;border:none;border-radius:8px;background:#2563eb;color:#fff;cursor:pointer;font-weight:600;}
.vote-btn-small{background:#16a34a;color:#fff;border:none;border-radius:6px;padding:2px 6px;font-size:12px;width:auto;margin-left:6px;cursor:pointer;}
.vote-btn-small:disabled{background:#9ca3af;cursor:not-allowed;}
</style>
</head>
<body>
<div class="container">
<h1>Hive Ultimate Ultra Kilat</h1>
<div id="userArea"></div>
<div id="content"></div>
<div id="loginModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:999;">
  <div style="background:#fff;padding:20px;border-radius:12px;width:90%;max-width:320px;">
    <h3>Login</h3>
    <input id="username" placeholder="Username">
    <input id="postingKey" placeholder="Posting Key">
    <button onclick="saveLogin()">Login</button>
    <button onclick="closeModal()" style="background:#9ca3af;margin-top:6px;">Batal</button>
  </div>
</div>
</div>

<script>
let user=localStorage.getItem("hive_user")||"";
let key=localStorage.getItem("hive_key")||"";
let startAuthor="", startPermlink="", currentSort="created";
let posts=[], cachePosts={}, cacheComments={};
const content=document.getElementById("content");

/* LOGIN */
function saveLogin(){
  user=document.getElementById("username").value.trim().toLowerCase().replace(/[^a-z0-9.-]/g,"");
  key=document.getElementById("postingKey").value.trim();
  if(!user||!key){alert("Isi username & posting key!"); return;}
  localStorage.setItem("hive_user",user);
  localStorage.setItem("hive_key",key);
  closeModal();
  renderUserArea();
}
function logout(){localStorage.removeItem("hive_user");localStorage.removeItem("hive_key");user="";key="";renderUserArea();}
function renderUserArea(){
  const el=document.getElementById("userArea");
  el.innerHTML=user?`<p>Login sebagai: <b>${user}</b> <span style="color:#ef4444;cursor:pointer" onclick="logout()">Logout</span></p>`:`<p>Login dulu <span style="color:#2563eb;cursor:pointer" onclick="openModal()">Login</span></p>`;
}
function openModal(){document.getElementById("loginModal").style.display="flex";}
function closeModal(){document.getElementById("loginModal").style.display="none";}

/* ROUTE */
function getRoute(){
  const hash=location.hash.replace("#","");
  if(!hash) return {type:"home"};
  const parts=hash.split("/");
  if(parts.length===2) return {type:"post",author:parts[0].replace("@",""),permlink:parts[1]};
  return {type:"home"};
}

/* FETCH POSTS */
let loadingPosts=false;
async function loadPosts(){
  if(loadingPosts) return;
  loadingPosts=true;
  const params={limit:10};
  if(startAuthor){params.start_author=startAuthor; params.start_permlink=startPermlink;}
  try{
    const res=await fetch("https://api.hive.blog",{method:"POST",body:JSON.stringify({jsonrpc:"2.0",method:`condenser_api.get_discussions_by_${currentSort}`,params:[params],id:1})});
    const data=await res.json();
    data.result.forEach(p=>{
      posts.push(p);
      cachePosts[p.author+"/"+p.permlink]=p;
      prefetchPostBody(p.author,p.permlink);
      prefetchComments(p.author,p.permlink);
    });
    if(data.result.length){const last=data.result[data.result.length-1]; startAuthor=last.author; startPermlink=last.permlink;}
    if(getRoute().type==="home") renderHome();
  }catch(err){console.log("Gagal mengambil data");}
  loadingPosts=false;
}

/* PREFETCH POST BODY */
async function prefetchPostBody(author,permlink){
  const key=author+"/"+permlink;
  if(cachePosts[key].body) return; // sudah ada
  try{
    const res=await fetch("https://api.hive.blog",{method:"POST",body:JSON.stringify({jsonrpc:"2.0",method:"condenser_api.get_content",params:[author,permlink],id:2})});
    const data=await res.json();
    cachePosts[key].body=data.result.body;
  }catch{}
}

/* PREFETCH COMMENTS RECURSIVE */
async function prefetchComments(author,permlink){
  const key=author+"/"+permlink;
  try{
    const res=await fetch("https://api.hive.blog",{method:"POST",body:JSON.stringify({jsonrpc:"2.0",method:"bridge.get_discussion",params:{author,permlink},id:3})});
    const data=await res.json();
    cacheComments[key]=data.result;
  }catch{}
}

/* HOME */
function renderHome(){
  let html="<ul>";
  posts.forEach(p=>{
    const votes=p.active_votes?p.active_votes.length:0;
    const comments=p.children||0;
    const payout=p.pending_payout_value||"$0.00";
    html+=`<li onclick="openPost('${p.author}','${p.permlink}')">
      <div><b>${p.title}</b><br><small>@${p.author} • 👍 ${votes} • 💬 ${comments} • 💰 ${payout}</small></div>
    </li>`;
  });
  html+="</ul>";
  content.innerHTML=html;
}

/* LOAD POST */
async function renderPost(author,permlink){
  window.scrollTo(0,0);
  const postKey=author+"/"+permlink;
  let post=cachePosts[postKey];
  if(!post || !post.body){content.innerHTML="<div>⏳ Memuat artikel…</div>"; await prefetchPostBody(author,permlink); post=cachePosts[postKey];}
  const votes=post.active_votes?post.active_votes.length:0;
  const commentsCount=post.children||0;
  const payout=post.pending_payout_value||"$0.00";
  const alreadyVoted=user && post.active_votes.some(v=>v.voter===user);
  const body=post.body?marked.parse(post.body):"<i>Konten belum dimuat…</i>";
  content.innerHTML=`
    <div class="post-card">
      <h2>${post.title}</h2>
      <p><small>@${post.author} • 👍 ${votes} • 💬 ${commentsCount} • 💰 ${payout} 
      ${user?`<button class="vote-btn-small" ${alreadyVoted?"disabled":""} onclick="vote('${author}','${permlink}', this)">${alreadyVoted?"Sudah Vote":"Vote"}</button>`:""}</small></p>
      <div>${body}</div>
      <h3>Komentar</h3>
      <div id="comments">Memuat komentar…</div>
      <button onclick="goHome()">Kembali</button>
    </div>`;
  renderComments(author,permlink);
  renderUserArea();
}

/* RENDER COMMENTS DARI CACHE */
function renderComments(author,permlink){
  const key=author+"/"+permlink;
  const container=document.getElementById("comments");
  container.innerHTML="";
  const data=cacheComments[key];
  if(!data){container.innerHTML="<i>Tidak ada komentar.</i>"; return;}
  Object.values(data).forEach(c=>{
    if(c.depth===0) return;
    const div=document.createElement("div");
    div.className="comment";
    div.style.marginLeft=`${(c.depth-1)*20}px`;
    div.innerHTML=`<div class="comment-author">@${c.author}</div><div>${marked.parse(c.body||"")}</div>`;
    container.appendChild(div);
  });
}

/* VOTE */
function vote(author,permlink,btn){
  if(!user||!key){alert("Login dulu!"); return;}
  btn.innerText="Voting…"; btn.disabled=true;
  hive.broadcast.vote(key,user,author,permlink,10000,function(err,result){
    if(err){alert("Gagal vote: "+err.message); btn.innerText="Vote"; btn.disabled=false;}
    else{btn.innerText="Sudah Vote"; btn.disabled=true;}
  });
}

/* NAVIGATION */
function openPost(author,permlink){location.hash=`@${author}/${permlink}`;}
function goHome(){location.hash="";}

/* INFINITE SCROLL */
window.addEventListener("scroll",()=>{
  if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 300){
    loadPosts();
  }
});

/* INIT */
window.addEventListener("hashchange",()=>{const route=getRoute(); route.type==="home"?renderHome():renderPost(route.author,route.permlink);});
renderUserArea();
renderHome();
loadPosts();
</script>
</body>
</html>
